name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Node.js build + test ──────────────────────────────────────────────────
  node:
    name: "Node ${{ matrix.node-version }} — build & test"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type check (no emit)
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test --coverage --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: coverage-node
          path: packages/*/coverage/
          retention-days: 7

  # ── Python setup + test (Phase 2 packages) ───────────────────────────────
  python:
    name: "Python ${{ matrix.python-version }} — build & test"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    # Only run when Python packages exist
    if: hashFiles('packages/rvfs-server-python/pyproject.toml') != '' || hashFiles('packages/rvfs-client-python/pyproject.toml') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install server deps
        working-directory: packages/rvfs-server-python
        if: hashFiles('packages/rvfs-server-python/pyproject.toml') != ''
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Create venv and install client deps
        working-directory: packages/rvfs-client-python
        if: hashFiles('packages/rvfs-client-python/pyproject.toml') != ''
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Test server
        working-directory: packages/rvfs-server-python
        if: hashFiles('packages/rvfs-server-python/pyproject.toml') != ''
        run: .venv/bin/pytest --cov --cov-report=xml -q

      - name: Test client
        working-directory: packages/rvfs-client-python
        if: hashFiles('packages/rvfs-client-python/pyproject.toml') != ''
        run: .venv/bin/pytest --cov --cov-report=xml -q

  # ── .gitignore hygiene ────────────────────────────────────────────────────
  gitignore-check:
    name: "Gitignore hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure no tracked files match .gitignore patterns
        run: |
          # Fail if any tracked file would now be ignored (indicates stale tracking)
          IGNORED=$(git ls-files --ignored --exclude-standard)
          if [ -n "$IGNORED" ]; then
            echo "ERROR: The following tracked files match .gitignore patterns:"
            echo "$IGNORED"
            echo "Run 'git rm --cached <file>' for each, then commit."
            exit 1
          fi
          echo "✓ No tracked files violate .gitignore"

      - name: Check no .env files committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.' | grep -v '\.example$'; then
            echo "ERROR: .env file(s) committed — remove from tracking immediately"
            exit 1
          fi
          echo "✓ No .env files tracked"

      - name: Check no node_modules or dist committed
        run: |
          if git ls-files | grep -E '^(packages/)?[^/]+/node_modules/|^(packages/)?[^/]+/dist/'; then
            echo "ERROR: node_modules or dist directories are tracked"
            exit 1
          fi
          echo "✓ No build artifacts tracked"

  # ── Version consistency ───────────────────────────────────────────────────
  version-check:
    name: "Version consistency"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: All package.json versions match VERSION file
        run: |
          if [ ! -f VERSION ]; then
            echo "WARNING: VERSION file not found — skipping version check"
            exit 0
          fi
          EXPECTED=$(cat VERSION | tr -d '[:space:]')
          FAIL=0
          for pkg in packages/*/package.json; do
            ACTUAL=$(node -e "process.stdout.write(require('./${pkg}').version ?? '')")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "MISMATCH: $pkg has version $ACTUAL, expected $EXPECTED"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✓ All packages at version $EXPECTED"
